<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NexusStore - Inicio de Sesión y Seguridad</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />


    <link href="css/styles.css" rel="stylesheet" />
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center bg-primary size-12 rounded-xl text-white mb-4 shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-3xl">storefront</span>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">NexusStore</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Inicio de Sesión y Seguridad</p>
        </div>
        <div
            class="bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none">
            <div id="login-alert"
                class="hidden mb-6 p-4 rounded-xl text-sm font-bold flex items-center justify-between shadow-sm">
                <div class="flex items-center gap-2">
                    <span id="login-alert-icon" class="material-symbols-outlined text-[20px]"></span>
                    <span id="login-alert-message"></span>
                </div>
                <button type="button" onclick="document.getElementById('login-alert').classList.add('hidden')"
                    class="text-current opacity-70 hover:opacity-100 transition-opacity">
                    <span class="material-symbols-outlined text-[18px]">close</span>
                </button>
            </div>
            <form action="#" class="space-y-5" onsubmit="return false;">
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5" for="email">Correo
                        Electrónico</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
                        <input
                            class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                            id="email" name="email" placeholder="nombre@empresa.com" required="" type="email" />
                    </div>
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-300"
                            for="password">Contraseña</label>
                        <a class="text-xs font-bold text-primary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
                    </div>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                        <input
                            class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-10 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                        <button id="toggle-password"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
                            type="button">
                            <span class="material-symbols-outlined text-[20px]"
                                id="toggle-password-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <button
                    class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2"
                    type="submit">
                    Iniciar Sesión
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                </button>
            </form>
        </div>
        <p class="text-center mt-8 text-sm text-slate-500 dark:text-slate-400">
            ¿No tienes una cuenta?
            <a class="text-primary font-bold hover:underline" href="registro.html">Crear una cuenta</a>
        </p>
        <div class="mt-12 flex items-center justify-center gap-6 opacity-50 grayscale dark:invert">
            <div class="flex items-center gap-1.5">
                <span class="material-symbols-outlined text-[18px]">verified_user</span>
                <span class="text-[10px] font-bold uppercase tracking-widest">SSL Seguro</span>
            </div>
            <div class="flex items-center gap-1.5">
                <span class="material-symbols-outlined text-[18px]">shield</span>
                <span class="text-[10px] font-bold uppercase tracking-widest">Privacidad Protegida</span>
            </div>
        </div>
    </div>


    <script type="module" src="js/login.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
