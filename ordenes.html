<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Historial de Pedidos - NexusStore</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />


    <link href="css/styles.css" rel="stylesheet" />
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside
            class="w-64 flex-shrink-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col md:flex">
            <div class="p-6">
                <div class="flex items-center gap-3">
                    <div class="bg-primary size-10 rounded-lg flex items-center justify-center text-white">
                        <span class="material-symbols-outlined text-[24px]">shopping_bag</span>
                    </div>
                    <div>
                        <h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-none">NexusStore</h1>
                        <p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Portal del Cliente</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="index.html">
                    <span class="material-symbols-outlined text-[24px]">home</span>
                    <span class="text-sm font-medium">Inicio</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="categorias.html">
                    <span class="material-symbols-outlined text-[24px]">category</span>
                    <span class="text-sm font-medium">Categorías</span>
                </a>


                <a class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold"
                    href="ordenes.html">
                    <span class="material-symbols-outlined text-[24px]">history</span>
                    <span class="text-sm">Órdenes</span>
                </a>
            </nav>
            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-3 p-2">
                    <div
                        class="size-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-400">
                        <span class="material-symbols-outlined">person</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-sm font-bold truncate">Invitado</p>
                        <p class="text-xs text-slate-500 truncate">Visitante</p>
                    </div>
                    <a href="login.html"><span
                            class="material-symbols-outlined text-slate-400 cursor-pointer hover:text-primary transition-colors">login</span></a>
                </div>
            </div>
        </aside>
        <main class="flex-1 flex flex-col overflow-hidden">
            <header
                class="h-16 flex-shrink-0 flex items-center justify-between px-4 md:px-8 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-3 flex-1 overflow-hidden">
                    <button id="menu-toggle"
                        class="md:hidden size-10 flex-shrink-0 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <h2 class="text-lg md:text-xl font-bold text-slate-900 dark:text-slate-100 truncate">Órdenes</h2>
                </div>
                <div class="flex items-center gap-2 md:gap-4">
                    <div class="relative hidden sm:block">
                        <input
                            class="bg-slate-100 dark:bg-slate-800 border-none rounded-lg py-2 pl-10 pr-4 text-sm w-48 focus:ring-2 focus:ring-primary/20"
                            placeholder="Buscar..." type="text" />
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">search</span>
                    </div>
                    <button
                        class="size-10 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
                        <span class="material-symbols-outlined">filter_list</span>
                    </button>

                    <div class="h-6 w-px bg-slate-200 dark:bg-slate-800 hidden sm:block"></div>
                    <a href="login.html" id="header-login-link"
                        class="hidden text-sm font-bold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
                        Iniciar Sesión
                    </a>
                    <a href="carrito.html"
                        class="bg-primary text-white text-xs md:text-sm font-bold px-3 md:px-4 py-2 rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-1 md:gap-2">
                        <span class="material-symbols-outlined text-[18px]">shopping_cart</span>
                        <span class="cart-text">Carrito (0)</span>
                    </a>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-8 bg-background-light dark:bg-background-dark">
                <div id="orders-container" class="space-y-4">
                    <!-- Dynamic orders injected here -->
                </div>
            </div>
        </main>
    </div>


    <!-- Order Details Modal -->
    <div id="order-modal"
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div
            class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300">
            <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                <h3 class="text-xl font-bold" id="modal-order-number">Detalles del Pedido</h3>
                <button id="close-modal"
                    class="size-8 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 transition-colors">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="p-6">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-8">
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Fecha</p>
                        <p class="font-bold text-slate-900 dark:text-slate-100" id="modal-order-date">-</p>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Estado</p>
                        <span id="modal-order-status"
                            class="inline-flex px-2 py-0.5 rounded text-[10px] font-black uppercase tracking-wider bg-slate-100 text-slate-600">-</span>
                    </div>
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Pago</p>
                        <p class="font-bold text-slate-900 dark:text-slate-100 text-sm" id="modal-order-payment">-</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Total</p>
                        <p class="text-xl font-black text-primary" id="modal-order-total">$0.00</p>
                    </div>
                </div>

                <div class="space-y-4 max-h-[400px] overflow-y-auto pr-2" id="modal-items-container">
                    <!-- Detalle items will be injected here -->
                </div>
            </div>
            <div
                class="px-6 py-4 bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-800 flex justify-end">
                <button id="close-modal-btn"
                    class="px-6 py-2 bg-slate-900 dark:bg-slate-700 text-white rounded-lg font-bold hover:bg-slate-800 transition-colors">
                    Cerrar
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="js/ordenes.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
