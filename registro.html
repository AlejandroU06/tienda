<!DOCTYPE html>
<html class="light" lang="es">

<head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title>Crear Cuenta - NexusStore</title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
                rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
                rel="stylesheet" />


        <link href="css/styles.css" rel="stylesheet" />
</head>

<body
        class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen flex items-center justify-center p-6">
        <div class="max-w-md w-full my-8">
                <div class="text-center mb-8">
                        <div
                                class="inline-flex items-center justify-center bg-primary size-12 rounded-xl text-white mb-4 shadow-lg shadow-primary/20">
                                <span class="material-symbols-outlined text-3xl">storefront</span>
                        </div>
                        <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">NexusStore
                        </h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-2 font-medium">Crear una cuenta</p>
                </div>
                <div
                        class="bg-white dark:bg-slate-900 p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xl shadow-slate-200/50 dark:shadow-none">
                        <form action="#" class="space-y-5" onsubmit="return false;">
                                <div class="grid grid-cols-2 gap-4">
                                        <div>
                                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5"
                                                        for="firstname">Primer Nombre</label>
                                                <div class="relative">
                                                        <span
                                                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">person</span>
                                                        <input class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                                                id="firstname" name="firstname" placeholder="John"
                                                                required="" type="text" />
                                                </div>
                                        </div>
                                        <div>
                                                <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5"
                                                        for="lastname">Primer Apellido</label>
                                                <div class="relative">
                                                        <span
                                                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">person</span>
                                                        <input class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                                                id="lastname" name="lastname" placeholder="Doe"
                                                                required="" type="text" />
                                                </div>
                                        </div>
                                </div>
                                <div>
                                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5"
                                                for="email">Correo Electrónico</label>
                                        <div class="relative">
                                                <span
                                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
                                                <input class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                                        id="email" name="email" placeholder="nombre@ejemplo.com"
                                                        required="" type="email" />
                                        </div>
                                </div>
                                <div>
                                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5"
                                                for="password">Contraseña (Telefono)</label>
                                        <div class="relative">
                                                <span
                                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
                                                <input class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-10 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                                        id="password" name="password" placeholder="••••••••" required=""
                                                        type="password" />
                                                <button id="toggle-password"
                                                        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
                                                        type="button">
                                                        <span id="toggle-password-icon"
                                                                class="material-symbols-outlined text-[20px]">visibility</span>
                                                </button>
                                        </div>
                                </div>
                                <div>
                                        <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1.5"
                                                for="confirm-password">Confirmar Contraseña (Telefono)</label>
                                        <div class="relative">
                                                <span
                                                        class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock_reset</span>
                                                <input class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-10 py-3 text-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none"
                                                        id="confirm-password" name="confirm-password"
                                                        placeholder="••••••••" required="" type="password" />
                                        </div>
                                </div>
                                <div class="flex items-start">
                                        <input class="mt-1 w-4 h-4 text-primary bg-slate-100 border-slate-300 rounded focus:ring-primary/20"
                                                id="terms" required="" type="checkbox" />
                                        <label class="ml-2 text-sm text-slate-500 dark:text-slate-400 leading-tight"
                                                for="terms">
                                                Acepto los <a class="text-primary font-bold hover:underline"
                                                        href="#">Términos y Condiciones</a> y la <a
                                                        class="text-primary font-bold hover:underline" href="#">Política
                                                        de Privacidad</a>
                                        </label>
                                </div>
                                <button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2"
                                        type="submit">
                                        Crear Cuenta
                                        <span class="material-symbols-outlined text-[20px]">person_add</span>
                                </button>
                        </form>
                        <div class="relative my-8">
                                <div class="absolute inset-0 flex items-center">
                                        <div class="w-full border-t border-slate-100 dark:border-slate-800"></div>
                                </div>
                                <div class="relative flex justify-center text-xs font-bold uppercase tracking-wider">
                                        <span class="bg-white dark:bg-slate-900 px-4 text-slate-400">O regístrate
                                                con</span>
                                </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                                <button
                                        class="flex items-center justify-center gap-2 px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                        <img alt="Google" class="w-4 h-4"
                                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBI9Q8VgRatVSXBVevltb0zWRWBcVvaOZKTxzJUOX6zC67S2-OW6Qs-uOf0HyvXX4UBUHV1EZE8F_26wPcnf7xEO-ljCBde25XPA07UgW8CUOmODX-CYfjLw94X24IhWHMYlTFv6T55S3gvBHeHhgdH7usmFYQzUorXzgUE9lv6l08xA0N9PnIQ19_XgJZJJG03Rvqc_PhDrgFLUVIDOGvH7wvpuL-TWrZwtySwpQxj2oenb4AJ99J1OdhAX1L5v0H29B-T9xTQ_nKM" />
                                        <span class="text-sm font-bold text-slate-700 dark:text-slate-300">Google</span>
                                </button>
                                <button
                                        class="flex items-center justify-center gap-2 px-4 py-3 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                                        <span
                                                class="material-symbols-outlined text-[20px] text-slate-900 dark:text-white">language</span>
                                        <span class="text-sm font-bold text-slate-700 dark:text-slate-300">Apple</span>
                                </button>
                        </div>
                </div>
                <p class="text-center mt-8 text-sm text-slate-500 dark:text-slate-400">
                        ¿Ya tienes una cuenta?
                        <a class="text-primary font-bold hover:underline" href="login.html">Iniciar Sesión</a>
                </p>
                <div class="mt-12 flex items-center justify-center gap-6 opacity-50 grayscale dark:invert">
                        <div class="flex items-center gap-1.5">
                                <span class="material-symbols-outlined text-[18px]">verified_user</span>
                                <span class="text-[10px] font-bold uppercase tracking-widest">SSL Seguro</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                                <span class="material-symbols-outlined text-[18px]">shield</span>
                                <span class="text-[10px] font-bold uppercase tracking-widest">Privacidad
                                        Protegida</span>
                        </div>
                </div>
        </div>


        <script type="module" src="js/registro.js"></script>
        <script type="module" src="js/app.js"></script>
</body>

</html>
