<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Finalizar Compra - NexusStore</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside
            class="w-64 flex-shrink-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col md:flex">
            <div class="p-6">
                <div class="flex items-center gap-3">
                    <div class="bg-primary size-10 rounded-lg flex items-center justify-center text-white">
                        <span class="material-symbols-outlined text-[24px]">shopping_bag</span>
                    </div>
                    <div>
                        <h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-none">NexusStore</h1>
                        <p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Portal del Cliente</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="index.html">
                    <span class="material-symbols-outlined text-[24px]">home</span>
                    <span class="text-sm">Inicio</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="categorias.html">
                    <span class="material-symbols-outlined text-[24px]">category</span>
                    <span class="text-sm font-medium">Categorías</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="ordenes.html">
                    <span class="material-symbols-outlined text-[24px]">history</span>
                    <span class="text-sm font-medium">Órdenes</span>
                </a>
            </nav>
            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-3 p-2">
                    <div
                        class="size-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-400">
                        <span class="material-symbols-outlined">person</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-sm font-bold truncate">Invitado</p>
                        <p class="text-xs text-slate-500 truncate">Visitante</p>
                    </div>
                </div>
            </div>
        </aside>
        <main class="flex-1 flex flex-col overflow-hidden">
            <header
                class="h-16 flex-shrink-0 flex items-center justify-between px-4 md:px-8 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-3 flex-1 overflow-hidden">
                    <button id="menu-toggle"
                        class="md:hidden size-10 flex-shrink-0 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <h2 class="text-lg md:text-xl font-bold text-slate-900 dark:text-slate-100 truncate">Finalizar
                        Compra</h2>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-background-light dark:bg-background-dark">
                <div class="max-w-6xl mx-auto py-8">
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div class="lg:col-span-8">
                            <div
                                class="bg-white dark:bg-slate-900 p-6 md:p-8 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
                                <h2 class="text-2xl font-bold mb-8">Información de Envío</h2>
                                <form class="space-y-6">
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div class="space-y-2">
                                            <label
                                                class="text-sm font-semibold text-slate-700 dark:text-slate-300">Nombre</label>
                                            <input class="w-full" placeholder="John" type="text" />
                                        </div>
                                        <div class="space-y-2">
                                            <label
                                                class="text-sm font-semibold text-slate-700 dark:text-slate-300">Apellido</label>
                                            <input class="w-full" placeholder="Doe" type="text" />
                                        </div>
                                    </div>
                                    <div class="space-y-2">
                                        <label
                                            class="text-sm font-semibold text-slate-700 dark:text-slate-300">Dirección</label>
                                        <input class="w-full" placeholder="123 Shopping Ave, Suite 4B" type="text" />
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div class="space-y-2">
                                            <label
                                                class="text-sm font-semibold text-slate-700 dark:text-slate-300">Ciudad</label>
                                            <input class="w-full" placeholder="New York" type="text" />
                                        </div>
                                        <div class="space-y-2">
                                            <label
                                                class="text-sm font-semibold text-slate-700 dark:text-slate-300">Estado
                                                / Provincia</label>
                                            <select class="w-full">
                                                <option>New York</option>
                                                <option>California</option>
                                                <option>Texas</option>
                                            </select>
                                        </div>
                                        <div class="space-y-2">
                                            <label
                                                class="text-sm font-semibold text-slate-700 dark:text-slate-300">Código
                                                Postal</label>
                                            <input class="w-full" placeholder="10001" type="text" />
                                        </div>
                                    </div>
                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div class="space-y-2">
                                            <label
                                                class="text-sm font-semibold text-slate-700 dark:text-slate-300">Número
                                                de Teléfono</label>
                                            <div class="relative">
                                                <span
                                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">call</span>
                                                <input class="w-full pl-10" placeholder="+1 (555) 000-0000"
                                                    type="tel" />
                                            </div>
                                        </div>
                                        <div class="space-y-2">
                                            <label
                                                class="text-sm font-semibold text-slate-700 dark:text-slate-300">Correo
                                                Electrónico</label>
                                            <div class="relative">
                                                <span
                                                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
                                                <input class="w-full pl-10" placeholder="john@example.com"
                                                    type="email" />
                                            </div>
                                        </div>
                                    </div>
                                    <div
                                        class="pt-6 border-t border-slate-100 dark:border-slate-800 flex flex-col md:flex-row items-center justify-between gap-4">
                                        <div class="flex items-center gap-2">
                                            <input class="rounded border-slate-300 text-primary focus:ring-primary"
                                                id="save-info" type="checkbox" />
                                            <label class="text-sm text-slate-500" for="save-info">Guardar esta
                                                información para la próxima vez</label>
                                        </div>
                                        <button
                                            class="w-full md:w-auto bg-primary hover:bg-primary/90 text-white px-8 py-3 rounded-xl font-bold text-sm shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2"
                                            type="submit">
                                            Continuar al Pago
                                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <div class="lg:col-span-4">
                            <div class="sticky top-8 space-y-4">
                                <div
                                    class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                                    <div
                                        class="p-6 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                                        <h3 class="font-bold">Resumen del Pedido</h3>
                                        <span
                                            class="text-xs bg-slate-100 dark:bg-slate-800 px-2 py-1 rounded font-bold">3
                                            Artículos</span>
                                    </div>
                                    <div class="p-6 space-y-4">
                                        <div class="flex items-center gap-4">
                                            <div class="size-12 rounded bg-slate-100 dark:bg-slate-800 bg-cover bg-center shrink-0"
                                                style="background-image: url('assets/imágenes/prueba.jpg')"></div>
                                            <div class="flex-1 min-w-0">
                                                <p class="text-sm font-bold truncate">Premium Air Sneakers</p>
                                                <p class="text-xs text-slate-500">Qty: 1</p>
                                            </div>
                                            <span class="text-sm font-bold">$120.00</span>
                                        </div>
                                    </div>
                                    <div class="p-6 bg-slate-50 dark:bg-slate-900/50 space-y-3">
                                        <div class="flex justify-between text-sm">
                                            <span class="text-slate-500">Subtotal</span>
                                            <span class="font-medium">$120.00</span>
                                        </div>
                                        <div class="flex justify-between text-sm">
                                            <span class="text-slate-500">Envío</span>
                                            <span class="font-medium text-emerald-600">Gratis</span>
                                        </div>
                                        <div
                                            class="pt-3 border-t border-slate-200 dark:border-slate-700 flex justify-between">
                                            <span class="font-bold">Total</span>
                                            <span class="text-xl font-black text-primary">$120.00</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>

</html>
