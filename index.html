<!DOCTYPE html>
<html class="light" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>UFPStore - Recomendaciones de Productos</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />


    <link href="css/styles.css" rel="stylesheet" />
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside
            class="w-64 flex-shrink-0 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col md:flex">
            <div class="p-6">
                <div class="flex items-center gap-3">
                    <div class="size-10 rounded-lg flex items-center justify-center p-1">
                        <img src="assets/imágenes/ufps.png" alt="Logo UFPS" class="h-full w-full object-contain">
                    </div>
                    <div>
                        <h1 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-none">UFPStore</h1>
                        <p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Portal del Cliente</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold"
                    href="index.html">
                    <span class="material-symbols-outlined text-[24px]">home</span>
                    <span class="text-sm">Inicio</span>
                </a>
                <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="categorias.html">
                    <span class="material-symbols-outlined text-[24px]">category</span>
                    <span class="text-sm font-medium">Categorías</span>
                </a>


                <a class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
                    href="ordenes.html">
                    <span class="material-symbols-outlined text-[24px]">history</span>
                    <span class="text-sm font-medium">Órdenes</span>
                </a>
            </nav>
            <div class="p-4 border-t border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-3 p-2">
                    <div
                        class="size-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-400">
                        <span class="material-symbols-outlined">person</span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-sm font-bold truncate">Invitado</p>
                        <p class="text-xs text-slate-500 truncate">Visitante</p>
                    </div>
                    <a href="login.html"><span
                            class="material-symbols-outlined text-slate-400 cursor-pointer hover:text-primary transition-colors">login</span></a>
                </div>
            </div>
        </aside>
        <main class="flex-1 flex flex-col overflow-hidden">
            <header
                class="h-16 flex-shrink-0 flex items-center justify-between px-4 md:px-8 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-3 flex-1 overflow-hidden">
                    <button id="menu-toggle"
                        class="md:hidden size-10 flex-shrink-0 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <div class="relative w-full max-w-md hidden sm:block">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
                        <input id="search-input"
                            class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-lg py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/20"
                            placeholder="Buscar productos, marcas y más..." type="text" />
                    </div>
                </div>
                <div class="flex items-center gap-2 md:gap-4">
                    <div class="h-6 w-px bg-slate-200 dark:bg-slate-800 hidden sm:block"></div>
                    <a href="login.html" id="header-login-link"
                        class="hidden text-sm font-bold text-slate-600 dark:text-slate-400 hover:text-primary transition-colors">
                        Iniciar Sesión
                    </a>
                    <a href="carrito.html"
                        class="bg-primary text-white text-xs md:text-sm font-bold px-3 md:px-4 py-2 rounded-lg hover:bg-primary/90 transition-colors flex items-center gap-1 md:gap-2">
                        <span class="material-symbols-outlined text-[18px]">shopping_cart</span>
                        <span class="cart-text">Carrito (0)</span>
                    </a>
                </div>
            </header>
            <div class="flex-1 overflow-y-auto p-8 bg-background-light dark:bg-background-dark">
                <div class="max-w-7xl mx-auto">
                    <div class="flex items-center justify-between mb-8">
                        <div>
                            <h2 class="text-2xl font-black text-slate-900 dark:text-slate-100 tracking-tight">
                                Recomendado para Ti</h2>
                            <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Selecciones basadas en tu
                                actividad reciente</p>
                        </div>

                    </div>
                    <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        <!-- Dynamic products will be loaded here -->
                    </div>
                    <div id="pagination-container" class="mt-12 flex flex-col items-center">
                        <button id="load-more-btn"
                            class="px-8 py-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-full text-sm font-bold text-slate-600 dark:text-slate-400 hover:border-primary hover:text-primary transition-all shadow-sm">
                            Cargar Más Recomendaciones
                        </button>
                        <p id="pagination-info" class="text-xs text-slate-500 mt-4">Mostrando 8 de 42 selecciones
                            personalizadas</p>
                    </div>
                </div>
            </div>
        </main>
    </div>


    <script type="module" src="js/app.js"></script>
</body>

</html>
